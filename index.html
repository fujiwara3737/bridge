// ============================================================
// Audio TTS — Google Translate TTS (APIキー不要、クメール語対応)
// ============================================================
const audio = document.getElementById('ttsAudio');
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  // iOS/Safari対策: ユーザータップ起点で一度再生
  audio.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwmHAAAAAAD/+1DEAAAB8ANeUAAAIgAADSAAAAEAAAGkAAAAIAAANIAAAARMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7UMQbAAAADSAAAAAAAAANIAAAAAVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVQ==';
  audio.volume = 0.01;
  audio.play().then(() => { audio.pause(); audio.volume = 1.0; audioUnlocked = true; }).catch(() => {});
}

function speakWithGoogleTTS(text, lang) {
  return new Promise((resolve) => {
    if (!text || text.startsWith('[')) { resolve(); return; }

    const langCode = lang === 'ja' ? 'ja' : 'km';

    // テキストが長い場合は分割（Google TTSは200文字制限）
    const chunks = splitText(text, 180);
    let idx = 0;

    function playNext() {
      if (idx >= chunks.length) { resolve(); return; }
      const chunk = chunks[idx++];
      const url = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${langCode}&q=${encodeURIComponent(chunk)}`;

      audio.src = url;
      audio.playbackRate = 0.9;
      audio.onended = playNext;
      audio.onerror = () => {
        console.warn('TTS audio error, trying Web Speech API fallback');
        fallbackSpeak(text, lang).then(resolve);
      };
      audio.play().catch(() => {
        fallbackSpeak(text, lang).then(resolve);
      });
    }

    setSt('sp', lang === 'ja' ? '🇯🇵 読み上げ中...' : '🇰🇭 អានសំឡេង...');
    playNext();
  });
}

function splitText(text, max) {
  if (text.length <= max) return [text];
  const chunks = [];
  let start = 0;
  while (start < text.length) {
    let end = Math.min(start + max, text.length);
    // 文の区切りで分割
    if (end < text.length) {
      const lastPeriod = text.lastIndexOf('。', end);
      const lastSpace = text.lastIndexOf(' ', end);
      const breakAt = Math.max(lastPeriod, lastSpace);
      if (breakAt > start) end = breakAt + 1;
    }
    chunks.push(text.substring(start, end));
    start = end;
  }
  return chunks;
}

// Web Speech API フォールバック（日本語用）
function fallbackSpeak(text, lang) {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === 'ja' ? 'ja-JP' : 'km-KH';
    u.rate = 0.85;
    u.onend = resolve;
    u.onerror = () => resolve();
    setTimeout(resolve, 10000);
    speechSynthesis.speak(u);
  });
}

// ============================================================
// State
// ============================================================
let running=false,rec=null,recLang=null;

function init(){
  unlockAudio();
  navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
    s.getTracks().forEach(t=>t.stop());
    localStorage.setItem('km','1');
    document.getElementById('setup').classList.add('h');
    // テスト音声
    setTimeout(()=>speakWithGoogleTTS('教習ブリッジを開始します','ja'),300);
    renderQP();
  }).catch(()=>toast('⚠️ マイクの許可が必要です'));
}
if(localStorage.getItem('km')==='1'){document.getElementById('setup').classList.add('h');renderQP();}

function toggle(){
  unlockAudio();
  running?stop():start();
}
function start(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('⚠️ Chrome/Edgeをお使いください');return;}
  running=true;
  document.getElementById('pw').classList.add('on');
  document.getElementById('pl').textContent='タップして通訳停止';
  beginR('ja');
}
function stop(){
  running=false;
  if(rec){try{rec.abort();}catch(e){}rec=null;}
  document.getElementById('pw').classList.remove('on');
  document.getElementById('pl').textContent='タップして通訳開始';
  setSt('off','停止中');setL('通訳を開始するには下のボタンをタップ','');
  document.getElementById('wc').classList.remove('on');
  document.getElementById('la').className='la';
}

function beginR(lang){
  if(!running)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();
  r.lang=lang==='ja'?'ja-JP':'km-KH';
  r.continuous=true;r.interimResults=true;
  rec=r;recLang=lang;
  r.onstart=()=>{setSt('on','🇯🇵🇰🇭 待機中...');document.getElementById('wc').classList.add('on');};
  r.onresult=e=>{
    let it='',fn='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fn+=e.results[i][0].transcript;else it+=e.results[i][0].transcript;}
    if(it){const d=det(it);setL(it,d==='ja'?'🇯🇵':d==='km'?'🇰🇭':'🔍');document.getElementById('la').className=`la ${d==='ja'?'a-ja':d==='km'?'a-km':''}`;}
    if(fn&&fn.trim()){const t=fn.trim(),d=det(t);if(d!==lang&&d!=='unknown'){r.abort();handle(t,d);return;}handle(t,d);}
  };
  r.onerror=()=>{};
  r.onend=()=>{if(running){setTimeout(()=>beginR(recLang==='ja'?'km':'ja'),150);}};
  try{r.start();}catch(e){setTimeout(()=>{if(running)beginR(lang);},500);}
}

function det(t){if(/[\u1780-\u17FF]/.test(t))return'km';if(/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(t))return'ja';return'ja';}

async function handle(text,src){
  if(!text)return;
  const tgt=src==='ja'?'km':'ja';
  document.getElementById('slang').textContent=src==='ja'?'🇯🇵→🇰🇭':'🇰🇭→🇯🇵';
  const dict=src==='ja'?DJ:DK;
  let tr=look(text,dict),fd=!!tr;
  if(!tr){tr='[辞書未登録]';fd=false;}
  addMsg(src,text,tr,fd,tgt);
  setL('','');
  if(fd){
    // 音声再生中は認識を止める
    if(rec){try{rec.abort();}catch(e){}}
    await speakWithGoogleTTS(tr,tgt);
    if(running)beginR(tgt==='ja'?'km':'ja');
  }else{setSt('on','🇯🇵🇰🇭 待機中...');}
}

function look(text,dict){
  const c=text.replace(/[\s。、！？!?.]+$/g,'').trim();
  if(dict[c])return dict[c];if(dict[text])return dict[text];
  const s=c.replace(/[。、！？!?]/g,'').trim();
  if(dict[s])return dict[s];
  let best=null,bl=0;
  for(const[k,v]of Object.entries(dict)){if(s.includes(k)&&k.length>bl){best=v;bl=k.length;}if(k.includes(s)&&s.length>bl){best=v;bl=s.length;}}
  if(best&&bl>=s.length*.5)return best;
  const t=s.replace(/(してください|ください|しましょう|ましょう|ですよ|ですね|です|ます|よ|ね|か)$/,'').trim();
  for(const[k,v]of Object.entries(dict)){const kt=k.replace(/(してください|ください|しましょう|ましょう|ですよ|ですね|です|ます|よ|ね|か)$/,'').trim();if(t===kt)return v;if(t.length>3&&kt.includes(t)&&t.length>=kt.length*.5)return v;}
  return null;
}

// ============================================================
// UI
// ============================================================
function addMsg(lang,og,tr,fd,tgtLang){
  const a=document.getElementById('area'),m=document.createElement('div');
  m.className=`msg ${lang}`;
  const badge=fd?'<span class="badge">✓</span>':'';
  // エスケープしてからボタンに渡す
  const trEsc=tr.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const spBtn=fd?` <button class="sp-btn" onclick="replaySp('${trEsc}','${tgtLang}')">🔊</button>`:'';
  m.innerHTML=`<div class="ml">${lang==='ja'?'🇯🇵 指導員':'🇰🇭 教習生'}</div><div class="bb"><div class="og">${esc(og)}${badge}${spBtn}</div><div class="tr">${esc(tr)}</div></div>`;
  a.appendChild(m);a.scrollTop=a.scrollHeight;
  while(a.children.length>40)a.removeChild(a.firstChild);
}
function replaySp(text,lang){unlockAudio();speakWithGoogleTTS(text,lang);}
function setSt(cls,txt){document.getElementById('dot').className=`sd ${cls}`;document.getElementById('stxt').textContent=txt;}
function setL(t,e){const el=document.getElementById('lt');el.textContent=t||'待機中...';el.className=t?'lt ht':'lt';document.getElementById('dl').textContent=e;}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function renderQP(){
  const qj=['おはようございます','お疲れ様でした','こんにちは','ブレーキを踏んで','発進してください','止まってください','右に曲がって','左に曲がって','危ない','よくできました','落ち着いて','失敗して当たり前'];
  const qk=['សួស្តី','អរគុណ','ខ្ញុំមិនយល់ទេ','សូមនិយាយម្ដងទៀត','យឺតៗបន្តិច','មានសំណួរ','យល់ហើយ','ខ្ញុំភ័យ','ខ្ញុំត្រូវការសម្រាក'];
  const ja=document.getElementById('qj'),km=document.getElementById('qk');ja.innerHTML='';km.innerHTML='';
  qj.forEach(p=>{const c=document.createElement('button');c.className='qc';c.textContent=p;c.onclick=()=>{unlockAudio();handle(p,'ja');};ja.appendChild(c);});
  qk.forEach(p=>{const c=document.createElement('button');c.className='qc km';c.textContent=p;c.onclick=()=>{unlockAudio();handle(p,'km');};km.appendChild(c);});
}
